  nishiki-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nishiki-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NISHIKI_PORT=3002
      - NISHIKI_BACKEND_URL=http://nishiki-backend:3001
    networks:
      - nishiki-network

  nishiki-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: server
    container_name: nishiki-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "7073:3002"
      - "7072:3003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "authentik.local:192.168.0.125"
    environment:
      - NISHIKI_AUTH_AUTHENTIK_URL=https://authentik.local:30141
    networks:
      - nishiki-network
    volumes:
      - ./certs:/app/certs:ro

#volumes:
  #mongodb_data:

networks:
  nishiki-network:
    driver: bridge
